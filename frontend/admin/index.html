<!-- Main html dashboard file-->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h1 { margin-bottom: 10px; }
        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }
        .section {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

<h1>Admin Dashboard</h1>

<div class="section">
    <h2>Heat Controls</h2>
    <label>Heat ID: <input id="heatId" type="number" value="1"></label><br><br>

    <button onclick="startHeat()">Start Heat</button>
    <button onclick="finishHeat()">Finish Heat</button>
    <button onclick="window.location='heats.html'">Manage Heats</button>
    <button onclick="refreshLeaderboard()">Force Leaderboard Update</button>
</div>

<div class="section">
    <h2>Competitor Management</h2>
    <button onclick="window.location='competitors.html'">Manage Competitors</button>
    <button onclick="window.location='assign_competitors.html'">Assign Competitors to Heats</button>
</div>

<div class="section">
    <h2>Judge Management</h2>
    <button onclick="window.location='judges.html'">Manage Judges</button>
    <button onclick="window.location='judge_code.html'">Set Judge Code</button>
</div>

<h2 id="admin-timer-title">Current Heat Timer</h2>
<div id="admin-timer"></div>

<button onclick="goHome()">Home</button>

<script src="../js/timer.js"></script>
<script>    
function startHeat() {
    const id = document.getElementById("heatId").value;
    fetch(`http://localhost:8000/admin/heats/${id}/start`, {
        method: "POST"
    })
    .then(res => res.json())
    .then(data => {
        console.log("Start heat response:", data);
        location.reload();
    });
}

function finishHeat() {
    const id = document.getElementById("heatId").value;
    fetch(`http://localhost:8000/admin/heats/${id}/finish`, {
        method: "POST"
    }).then(() => {
        alert("Heat finished");
        location.reload();
    });
}
function refreshLeaderboard() {
    const id = document.getElementById("heatId").value;
    fetch(`http://localhost:8000/spectator/heat/${id}`)
        .then(() => {
            // Broadcast leaderboard update
            fetch(`http://localhost:8000/admin/broadcast/leaderboard/${id}`, { method: "POST" });
        });
}

function goHome() {
    window.location = "../index.html";
}

fetch("http://localhost:8000/admin/heats")
    .then(res => res.json())
    .then(heats => {
        const running = heats.find(h => h.status === "running");
        if (running) {
            document.getElementById("admin-timer-title").innerText =
                `Heat ${running.id} Timer`;
            startHeatTimer("admin-timer", running.id);
        } else {
            document.getElementById("admin-timer").innerText = "No heat running";
        }
    });

</script>

</body>
</html>
