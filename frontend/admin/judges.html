<body>

<h1>Manage Judges</h1>


<h2>Existing Judges</h2>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Delete</th>
        </tr>
    </thead>
    <tbody id="judgeTable"></tbody>
</table>

<script>

function loadJudges() {
    fetch(`${API}/judges`)
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById("judgeTable");
            tbody.innerHTML = "";

            data.forEach(j => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${j.id}</td>
                    <td>${j.name || ""}</td>
                    <td><button onclick="deleteJudge(${j.id})">Delete</button></td>
                `;
                tbody.appendChild(row);
            });
        });
}

function deleteJudge(id) {
    fetch(`${API}/judges/${id}`, { method: "DELETE" })
        .then(() => loadJudges());
}

loadJudges();
</script>
