<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Competitor Management</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h1 { margin-bottom: 10px; }
        input { padding: 8px; margin-right: 10px; }
        button { padding: 8px 12px; cursor: pointer; }
        table { margin-top: 20px; border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        th { background: #eee; }
    </style>
</head>
<body>

<h1>Competitor Management</h1>

<div>
    <input id="newName" placeholder="Competitor name">
    <button onclick="addCompetitor()">Add Competitor</button>
</div>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Delete</th>
        </tr>
    </thead>
    <tbody id="competitorTable"></tbody>
</table>

<button onclick="goBackToAdmin()">Back to Admin Dashboard</button>

<script>
const API = "http://localhost:8000/admin/competitors";

function goBackToAdmin() {
    window.location = "index.html";
}

function loadCompetitors() {
    fetch(API)
        .then(res => res.json())
        .then(data => {
            const table = document.getElementById("competitorTable");
            table.innerHTML = "";

            data.forEach(c => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${c.id}</td>
                    <td>${c.name}</td>
                    <td><button onclick="deleteCompetitor(${c.id})">Delete</button></td>
                `;
                table.appendChild(row);
            });
        });
}

function addCompetitor() {
    const name = document.getElementById("newName").value;
    if (!name) return;

    fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
    }).then(() => {
        document.getElementById("newName").value = "";
        loadCompetitors();
    });
}

function deleteCompetitor(id) {
    fetch(`${API}/${id}`, { method: "DELETE" })
        .then(() => loadCompetitors());
}

loadCompetitors();
</script>

</body>
</html>
