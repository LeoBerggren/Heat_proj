<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Judge Dashboard</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        h1, h2 { margin-bottom: 10px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; }
        th { background: #eee; }
        button { padding: 8px 12px; margin: 5px; cursor: pointer; }
        #judge-info { font-size: 18px; margin-bottom: 20px; }
    </style>
</head>
<body>

<h1>Judge Dashboard</h1>
<div id="judge-info">Loading judge info...</div>

<h2>Available Heats</h2>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Round</th>
            <th>Status</th>
            <th>Start</th>
            <th>End</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="heats-table"></tbody>
</table>

<h2 id="judge-timer-title">Heat Timer</h2>
<div id="judge-timer"></div>

<button onclick="goHome()">Home</button>

<script src="../js/timer.js"></script>
<script>
const API_BASE = "http://localhost:8000";
const judgeId = localStorage.getItem("judge_id");

if (!judgeId) {
    alert("You must log in as a judge first.");
    window.location = "judge_login.html";
}

function loadJudgeInfo() {
    fetch(`${API_BASE}/judge/judges/${judgeId}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById("judge-info").innerText =
                `Logged in as: ${data.name || "Judge " + data.id}`;
        });
}

function loadHeats() {
    fetch(`${API_BASE}/admin/heats/`)
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById("heats-table");
            tbody.innerHTML = "";

            data.forEach(h => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${h.id}</td>
                    <td>${h.round}</td>
                    <td>${h.status}</td>
                    <td>${h.start_time || ""}</td>
                    <td>${h.end_time || ""}</td>
                    <td>
                        <button onclick="volunteer(${h.id})">Score This Heat</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        });
}

function volunteer(heatId) {
    localStorage.setItem("current_heat_id", heatId);

    fetch(`${API_BASE}/judge/volunteer/${judgeId}/heat/${heatId}`, {
        method: "POST"
    })
    .then(res => res.json())
    .then(() => {
        window.location = "judge_scoring.html";
    });
}

function goHome() {
    localStorage.removeItem("current_heat_id");
    window.location = "../index.html";
}

fetch("http://localhost:8000/admin/heats")
    .then(res => res.json())
    .then(heats => {
        const running = heats.find(h => h.status === "running");
        if (running) {
            startHeatTimer("judge-timer", running.id);
        } else {
            document.getElementById("judge-timer").innerText = "No heat running";
        }
    });

    fetch("http://localhost:8000/admin/heats")
    .then(res => res.json())
    .then(heats => {
        const running = heats.find(h => h.status === "running");
        if (running) {
            document.getElementById("judge-timer-title").innerText =
                `Heat ${running.id} Timer`;

            startHeatTimer("judge-timer", running.id);
        } else {
            document.getElementById("judge-timer-title").innerText =
                "No Heat Running";
            document.getElementById("judge-timer").innerText = "";
        }
    });

loadJudgeInfo();
loadHeats();
</script>

</body>
</html>
